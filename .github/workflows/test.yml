name: Tests

on:
  push:
    branches: [main, PySide6]
  pull_request:
    branches: [main, PySide6]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install system deps for Qt offscreen (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt pytest-mock pytest-env

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest tests/unit tests/integration tests/scrapers \
            --ignore=tests/unit/scrapers -q
