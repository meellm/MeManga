name: Docker Image

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "compose.yaml"
      - "requirements.txt"
      - "pyproject.toml"
      - "memanga/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:
    inputs:
      push:
        description: "Push the image to GHCR and Docker Hub"
        required: true
        default: false
        type: boolean
      platforms:
        description: "Target platforms"
        required: true
        default: "linux/amd64,linux/arm64"
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/memanga
  DOCKERHUB_IMAGE: docker.io/meellm/memanga

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push' || inputs.push
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-

      # PR runs validate the build on a single native arch (no push); tag
      # pushes and manual dispatch build the full multi-arch image set.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.platforms || (github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64') }}
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
