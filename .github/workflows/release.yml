name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MeManga.exe
            asset_name: MeManga-windows-x64.exe
          - os: macos-latest
            artifact_name: MeManga
            asset_name: MeManga-macos-arm64
          - os: ubuntu-latest
            artifact_name: MeManga
            asset_name: MeManga-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system libraries for Qt/XCB + image plugins
        # The Qt6 XCB platform plugin (libqxcb.so) and the imageformats
        # plugins link against a set of XCB / xkbcommon / TIFF / JPEG
        # system libs that the bare GitHub `ubuntu-latest` runner does
        # not ship. Without them PyInstaller emits 20+ "Library not
        # found" warnings and the frozen binary fails to launch on
        # vanilla Ubuntu desktops with "qt.qpa.plugin: Could not load
        # the Qt platform plugin 'xcb'".
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-util1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 \
            libegl1 libgl1 libfontconfig1 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build release executable
        # build_app.py produces a single-file binary under `release/`
        # (release/MeManga.exe on Windows, release/MeManga elsewhere)
        # and sweeps the build/ + dist/ scratch dirs afterwards.
        run: python build_app.py

      - name: Verify Playwright works inside the built executable (Windows)
        # Release gate for issue #28: run the actual artifact on the
        # pristine runner — the same "fresh machine, first session"
        # conditions the bug reproduced under. The flag installs Firefox
        # through the bundled driver and launches it through the normal
        # Playwright transport; a non-zero exit fails the release.
        #
        # Start-Process WITHOUT stream redirection is deliberate: it
        # detaches the windowed exe from the runner's console so it gets
        # null standard handles, exactly like a user double-click. A
        # plain shell invocation would pipe valid handles in and mask
        # the very environment this gate exists to prove.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process -FilePath ".\release\${{ matrix.artifact_name }}" `
                 -ArgumentList "--verify-playwright" -PassThru -Wait
          Write-Host "----- runtime.log -----"
          Get-Content "$env:USERPROFILE\.config\memanga\runtime.log" -ErrorAction SilentlyContinue
          if ($p.ExitCode -ne 0) {
            Write-Error "Playwright self-test failed in the built executable (exit $($p.ExitCode))"
            exit 1
          }

      - name: Verify Playwright works inside the built executable (macOS)
        # Same gate for the macOS artifact (it had its own variant of the
        # browsers-path bug). Skipped on Linux: the bare runner lacks
        # Firefox's system libraries and the issue is specific to the
        # windowed Windows/macOS artifacts.
        if: runner.os == 'macOS'
        shell: bash
        run: |
          "./release/${{ matrix.artifact_name }}" --verify-playwright || {
            echo "::error::Playwright self-test failed in the built executable"
            echo "----- runtime.log -----"
            cat "$HOME/.config/memanga/runtime.log" 2>/dev/null || true
            exit 1
          }

      - name: Rename artifact for upload
        shell: bash
        run: mv "release/${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
