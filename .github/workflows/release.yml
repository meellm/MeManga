name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MeManga.exe
            asset_name: MeManga-windows-x64.exe
          - os: macos-latest
            artifact_name: MeManga
            asset_name: MeManga-macos-arm64
          - os: ubuntu-latest
            artifact_name: MeManga
            asset_name: MeManga-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build release executable
        # build_app.py produces a single-file binary at the repo root
        # (MeManga.exe on Windows, MeManga elsewhere) and sweeps the
        # build/ + dist/ scratch dirs afterwards.
        run: python build_app.py

      - name: Rename artifact for upload
        shell: bash
        run: mv "${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
